<script>
  function openFileExplorer() {
      // Trigger click event on the hidden file input element
      document.getElementById('fileInput').click();
  }
  
  // Listen for change event when user selects files
  document.getElementById('fileInput').addEventListener('change', function(event) {
      // Access the selected file using event.target.files
      var file = event.target.files[0];
      
      // Check if file is selected
      if (file) {
          // Read the file content and display it in the iframe
          var reader = new FileReader();
          reader.onload = function(e) {
              var fileContent = e.target.result;
              document.getElementById('fileFrame').src = fileContent;
          };
          reader.readAsDataURL(file);
      }
  });
  </script>
