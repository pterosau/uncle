  <!--Script for the Loading Page when Clicked-->
  <script>
      function showLoadingAnimation() {
        // Get the button and the loading animation elements
        const button = document.getElementById('load-btn');
        const loadingAnimation = document.createElement('div');
  
        // Add the 'loading' class to the loading animation element
        loadingAnimation.classList.add('loading');
  
        // Replace the button with the loading animation
        button.replaceWith(loadingAnimation);
  
        // Wait for 20 seconds before going to the next page
        setTimeout(() => {
          window.location.href = 'next-page.html';
        }, 20000); // 20 seconds
      }
  
      // Add an event listener to the button
      const button = document.getElementById('load-btn');
      button.addEventListener('click', showLoadingAnimation);
    </script>
